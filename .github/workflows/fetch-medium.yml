# .github/workflows/fetch-medium.yml
#
# Medium RSS'ini çekip kategorize eder.
# medium.com/feed/@USERNAME — bot koruması yok, datacenter IP'lerinden çalışır.

name: Fetch Medium Articles

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'    # data/ değişikliklerinde döngüyü önle
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install node-fetch
        run: cd scripts && npm install node-fetch@3

      - name: Fetch Medium articles
        run: node scripts/fetch-medium.js

      - name: Commit data files
        run: |
          git config --local user.email "ferhattufekci@outlook.com.tr"
          git config --local user.name  "Ferhat Tüfekçi"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update Medium articles [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Retry $i failed, waiting..."
            sleep $((i * 3))
          done
